# =============================================================================
# nginx.conf — Sample reverse proxy + load balancer configuration
#
# Demonstrates:
#   • upstream block with multiple backends (round-robin)
#   • reverse proxy with proper headers
#   • gzip compression
#   • keepalive to upstream pool
#   • health check endpoint
#
# Place at /etc/nginx/nginx.conf or include as a server block under
# /etc/nginx/conf.d/app.conf
# =============================================================================

# Number of worker processes (match CPU cores; "auto" works well)
worker_processes auto;

# Max file descriptors per worker (should be >= worker_connections)
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;                    # Linux: epoll is most efficient
    multi_accept on;              # accept as many connections at once as possible
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── Upstream pool (load balancing) ────────────────────────────────────
    # Replace with your actual backend addresses.
    # Algorithms: (default) round_robin | least_conn | ip_hash | random
    upstream app_backend {
        least_conn;                           # route to backend with fewest active connections

        server 127.0.0.1:8081 weight=3;      # weight: sends 3× more traffic here
        server 127.0.0.1:8082 weight=1;
        server 127.0.0.1:8083 weight=1;

        # Keepalive connections to upstream (avoids TCP handshake overhead)
        keepalive 32;
    }

    # ── Upstream pool for a second service (e.g. API) ─────────────────────
    upstream api_backend {
        server 127.0.0.1:9081;
        server 127.0.0.1:9082;
        server 127.0.0.1:9083 backup;        # backup: only used if primary servers fail

        keepalive 16;
    }

    # ── Rate limiting zone (shared memory: 10MB holds ~160K IPs) ──────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # ─────────────────────────────────────────────────────────────────────
    # Server block: reverse proxy → app_backend
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;                        # catch-all; replace with your domain

        # Health check endpoint (returns 200 directly, no upstream hit)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Main app: proxy to upstream pool
        location / {
            proxy_pass         http://app_backend;

            # Tell upstream the real client IP
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            # Enable keepalive to upstream
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # API routes with rate limiting
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }

    # ─────────────────────────────────────────────────────────────────────
    # HTTPS server (uncomment and add certificates for TLS)
    # ─────────────────────────────────────────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name example.com;
    #
    #     ssl_certificate     /etc/ssl/certs/example.crt;
    #     ssl_certificate_key /etc/ssl/private/example.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://app_backend;
    #         ...
    #     }
    # }
}
