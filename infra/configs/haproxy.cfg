# =============================================================================
# haproxy.cfg — Sample HAProxy load balancer configuration
#
# Demonstrates:
#   • HTTP frontend → backend with health checks
#   • Multiple LB algorithms (round-robin, leastconn, source)
#   • TCP (L4) mode for databases
#   • Stats page on port 8404
#   • ACL-based routing (path-based)
#   • Timeouts and connection tuning
#
# Install: sudo cp haproxy.cfg /etc/haproxy/haproxy.cfg
# Test:    sudo haproxy -c -f /etc/haproxy/haproxy.cfg
# =============================================================================

#----------------------------------------------------------------------
# Global settings (process-level config)
#----------------------------------------------------------------------
global
    log         /dev/log    local0          # syslog socket
    log         /dev/log    local1 notice
    chroot      /var/lib/haproxy            # security: chroot after bind
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user        haproxy
    group       haproxy
    daemon

    # Max number of concurrent connections across all frontends
    maxconn     50000

    # SSL tuning (if using HTTPS)
    # ssl-default-bind-ciphers ECDH+AESGCM:DH+AESGCM:ECDH+AES256:...
    # ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

#----------------------------------------------------------------------
# Default settings (inherited by all frontends/backends unless overridden)
#----------------------------------------------------------------------
defaults
    log         global
    mode        http                        # L7 HTTP mode (use 'tcp' for L4)
    option      httplog
    option      dontlognull                 # don't log health check probes
    option      forwardfor                  # add X-Forwarded-For header
    option      http-server-close           # server-side keep-alive off (saves FDs)

    # Timeouts (tune based on your app's response times)
    timeout connect  5s                     # time to establish connection to backend
    timeout client   50s                    # idle time on client side
    timeout server   50s                    # idle time on server side
    timeout http-request 15s               # max time to receive full HTTP request
    timeout http-keep-alive 10s            # max idle time on persistent connection

    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

#----------------------------------------------------------------------
# Stats page — http://localhost:8404/stats
#----------------------------------------------------------------------
frontend stats
    bind *:8404
    stats enable
    stats uri     /stats
    stats realm   HAProxy\ Statistics
    stats auth    admin:admin              # change in production!
    stats refresh 10s
    stats show-legends
    stats show-node

#----------------------------------------------------------------------
# Frontend: HTTP traffic on port 80
# Routes to different backends based on URL path (ACLs)
#----------------------------------------------------------------------
frontend http_in
    bind *:80

    # ACL definitions
    acl is_api      path_beg /api/
    acl is_static   path_beg /static/ /assets/ /images/
    acl is_ws       hdr(Upgrade) -i websocket

    # Route to appropriate backend
    use_backend     api_servers    if is_api
    use_backend     static_servers if is_static
    use_backend     ws_servers     if is_ws
    default_backend app_servers

#----------------------------------------------------------------------
# Backend: main application servers (round-robin, default)
# Algorithm options:
#   roundrobin   — distribute in turn (good for stateless apps)
#   leastconn    — fewest active connections (good for long requests)
#   source       — hash client IP → same server (sticky sessions)
#   random       — random choice (good for many small backends)
#----------------------------------------------------------------------
backend app_servers
    balance     roundrobin
    option      httpchk GET /health        # health check endpoint
    http-check  expect status 200

    # server <name> <host:port> [options]
    server  app1 127.0.0.1:8081 check inter 5s rise 2 fall 3
    server  app2 127.0.0.1:8082 check inter 5s rise 2 fall 3
    server  app3 127.0.0.1:8083 check inter 5s rise 2 fall 3 weight 2

    # Sticky sessions via cookie (optional; comment out for pure stateless LB)
    # cookie SERVERID insert indirect nocache

#----------------------------------------------------------------------
# Backend: API servers (leastconn — better for variable-latency APIs)
#----------------------------------------------------------------------
backend api_servers
    balance     leastconn
    option      httpchk GET /api/health

    server  api1 127.0.0.1:9081 check inter 5s
    server  api2 127.0.0.1:9082 check inter 5s
    server  api3 127.0.0.1:9083 check inter 5s backup  # only used if api1+api2 are down

#----------------------------------------------------------------------
# Backend: static file servers (source hash = same server per client IP)
#----------------------------------------------------------------------
backend static_servers
    balance     source
    option      httpchk HEAD /health

    server  static1 127.0.0.1:8091 check
    server  static2 127.0.0.1:8092 check

#----------------------------------------------------------------------
# Backend: WebSocket servers (needs timeout_tunnel)
#----------------------------------------------------------------------
backend ws_servers
    balance     source                     # sticky: WS connections are stateful
    timeout     tunnel 1h                  # keep WS tunnel open

    server  ws1 127.0.0.1:8093 check
    server  ws2 127.0.0.1:8094 check

#----------------------------------------------------------------------
# TCP (L4) frontend+backend example: PostgreSQL load balancing
# Mode tcp bypasses HTTP parsing — use for any TCP protocol
#----------------------------------------------------------------------
# frontend pg_in
#     bind  *:5430                         # expose on non-standard port
#     mode  tcp
#     option tcplog
#     default_backend pg_servers
#
# backend pg_servers
#     mode        tcp
#     balance     leastconn
#     option      pgsql-check user haproxy  # PostgreSQL-aware health check
#     timeout     connect 5s
#     timeout     client  1h
#     timeout     server  1h
#
#     server  pg1  127.0.0.1:5432 check
#     server  pg2  127.0.0.1:5433 check

#----------------------------------------------------------------------
# TCP backend example: Redis (no HTTP parsing needed)
#----------------------------------------------------------------------
# frontend redis_in
#     bind  *:6380
#     mode  tcp
#     default_backend redis_servers
#
# backend redis_servers
#     mode    tcp
#     balance first                        # 'first' = use first available server
#     option  tcp-check
#     tcp-check connect
#     tcp-check send PING\r\n
#     tcp-check expect string +PONG
#
#     server  redis1 127.0.0.1:6379 check
#     server  redis2 127.0.0.1:6380 check
