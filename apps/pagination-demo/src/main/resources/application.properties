server.port=8091
spring.application.name=pagination-demo

# PostgreSQL — uses the same Postgres container from apps/uber docker compose
# Create the DB first: psql -U postgres -c "CREATE DATABASE pagination_db;"
spring.datasource.url=jdbc:postgresql://localhost:5432/pagination_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update: creates/alters tables automatically (dev only — use Flyway in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.demo.pagination=INFO
