<svg width="1400" height="520" viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10z" fill="#546e7a"/>
  </marker>
  <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10z" fill="#e65100"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10z" fill="#1b5e20"/>
  </marker>
  <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10z" fill="#c62828"/>
  </marker>
</defs>

<rect width="1400" height="520" fill="#f8fafc"/>
<text x="700" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#1a237e">TROAS Campaign Phase State Machine</text>

<!-- Subtitle -->
<text x="700" y="62" font-size="13" text-anchor="middle" fill="#546e7a">Phase controls which bid strategy is applied · transitions driven by data availability + budget signals</text>

<!-- ─── Phase boxes (top row) ─── -->
<!-- 1. INITIALIZATION -->
<rect x="30" y="100" width="220" height="140" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
<rect x="30" y="100" width="220" height="42" rx="14" fill="#1565c0"/><rect x="30" y="128" width="220" height="14" fill="#1565c0"/>
<text x="140" y="128" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="white">INITIALIZATION</text>
<text x="140" y="165" font-size="13" font-weight="600" text-anchor="middle" fill="#1565c0">Bid Strategy</text>
<text x="140" y="184" font-size="12" text-anchor="middle" fill="#37474f">Historical base bid</text>
<text x="140" y="202" font-size="12" text-anchor="middle" fill="#37474f">+ time-of-day factor</text>
<text x="140" y="222" font-size="11" text-anchor="middle" fill="#546e7a">No conversion data yet</text>

<!-- 2. LEARNING -->
<rect x="310" y="100" width="220" height="140" rx="14" fill="#fff3e0" stroke="#e65100" stroke-width="3"/>
<rect x="310" y="100" width="220" height="42" rx="14" fill="#e65100"/><rect x="310" y="128" width="220" height="14" fill="#e65100"/>
<text x="420" y="128" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="white">LEARNING</text>
<text x="420" y="165" font-size="13" font-weight="600" text-anchor="middle" fill="#e65100">Bid Strategy</text>
<text x="420" y="184" font-size="12" text-anchor="middle" fill="#37474f">Explore bid space</text>
<text x="420" y="202" font-size="12" text-anchor="middle" fill="#37474f">(Bayesian bandit)</text>
<text x="420" y="222" font-size="11" text-anchor="middle" fill="#546e7a">Or ROAS-based if bidPrime ready</text>

<!-- 3. OPTIMIZATION -->
<rect x="590" y="100" width="220" height="140" rx="14" fill="#e8f5e9" stroke="#1b5e20" stroke-width="3"/>
<rect x="590" y="100" width="220" height="42" rx="14" fill="#1b5e20"/><rect x="590" y="128" width="220" height="14" fill="#1b5e20"/>
<text x="700" y="128" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="white">OPTIMIZATION</text>
<text x="700" y="165" font-size="13" font-weight="600" text-anchor="middle" fill="#1b5e20">Bid Strategy</text>
<text x="700" y="184" font-size="12" text-anchor="middle" fill="#37474f">ML-driven bid</text>
<text x="700" y="202" font-size="12" text-anchor="middle" fill="#37474f">(pCTR + pCVR models)</text>
<text x="700" y="222" font-size="11" text-anchor="middle" fill="#546e7a">Sufficient conversion data</text>

<!-- 4. TRANSITION -->
<rect x="870" y="100" width="220" height="140" rx="14" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="3"/>
<rect x="870" y="100" width="220" height="42" rx="14" fill="#6a1b9a"/><rect x="870" y="128" width="220" height="14" fill="#6a1b9a"/>
<text x="980" y="128" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="white">TRANSITION</text>
<text x="980" y="165" font-size="13" font-weight="600" text-anchor="middle" fill="#6a1b9a">Bid Strategy</text>
<text x="980" y="184" font-size="12" text-anchor="middle" fill="#37474f">ROAS-based wind-down</text>
<text x="980" y="202" font-size="12" text-anchor="middle" fill="#37474f">(bidPrime × factors)</text>
<text x="980" y="222" font-size="11" text-anchor="middle" fill="#546e7a">Experiment applied / strategy switch</text>

<!-- 5. LEARNING_PAUSED (below LEARNING) -->
<rect x="310" y="330" width="220" height="130" rx="14" fill="#fce4ec" stroke="#c62828" stroke-width="3"/>
<rect x="310" y="330" width="220" height="42" rx="14" fill="#c62828"/><rect x="310" y="358" width="220" height="14" fill="#c62828"/>
<text x="420" y="358" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="white">LEARNING_PAUSED</text>
<text x="420" y="395" font-size="13" font-weight="600" text-anchor="middle" fill="#c62828">No bid emitted</text>
<text x="420" y="415" font-size="12" text-anchor="middle" fill="#37474f">Budget depleted or</text>
<text x="420" y="433" font-size="12" text-anchor="middle" fill="#37474f">manual pause</text>
<text x="420" y="451" font-size="11" text-anchor="middle" fill="#546e7a">Items excluded from auction</text>

<!-- ARROWS between phases -->
<!-- INIT → LEARNING -->
<line x1="250" y1="170" x2="308" y2="170" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
<text x="279" y="163" font-size="10" text-anchor="middle" fill="#546e7a">goes live</text>

<!-- LEARNING → OPTIMIZATION -->
<line x1="530" y1="170" x2="588" y2="170" stroke="#1b5e20" stroke-width="2.5" marker-end="url(#arr-green)"/>
<text x="559" y="163" font-size="10" text-anchor="middle" fill="#1b5e20">data ready</text>

<!-- OPTIMIZATION → TRANSITION -->
<line x1="810" y1="170" x2="868" y2="170" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
<text x="839" y="163" font-size="10" text-anchor="middle" fill="#546e7a">experiment</text>

<!-- TRANSITION → END -->
<line x1="1090" y1="170" x2="1150" y2="170" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
<rect x="1152" y="152" width="60" height="38" rx="8" fill="#546e7a"/>
<text x="1182" y="175" font-size="13" font-weight="700" text-anchor="middle" fill="white">END</text>

<!-- LEARNING → LEARNING_PAUSED (down arrow) -->
<path d="M420 240 L420 328" stroke="#c62828" stroke-width="2.5" marker-end="url(#arr-red)" fill="none"/>
<text x="445" y="285" font-size="10" fill="#c62828">budget depleted /</text>
<text x="445" y="298" font-size="10" fill="#c62828">manual pause</text>

<!-- LEARNING_PAUSED → LEARNING (up arrow, offset) -->
<path d="M390 330 L390 242" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-orange)" fill="none"/>
<text x="340" y="285" font-size="10" text-anchor="middle" fill="#e65100">budget</text>
<text x="340" y="298" font-size="10" text-anchor="middle" fill="#e65100">restored</text>

<!-- Advertiser enables TROAS label -->
<text x="30" y="90" font-size="12" font-weight="600" fill="#1565c0">Advertiser</text>
<text x="30" y="104" font-size="12" font-weight="600" fill="#1565c0">enables TROAS</text>
<path d="M108 85 L108 98" stroke="#1565c0" stroke-width="2" marker-end="url(#arr)" fill="none"/>

<!-- Full score vs non-full score note under OPTIMIZATION -->
<rect x="585" y="262" width="230" height="48" rx="8" fill="#f1f8e9" stroke="#558b2f" stroke-width="1.5"/>
<text x="700" y="281" font-size="11" font-weight="600" text-anchor="middle" fill="#33691e">Full-score items: ML models active</text>
<text x="700" y="299" font-size="11" text-anchor="middle" fill="#33691e">Non-full-score: ROAS fallback</text>

<!-- INIT/TRANS uses same strategy note -->
<rect x="840" y="262" width="230" height="48" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
<text x="955" y="281" font-size="11" font-weight="600" text-anchor="middle" fill="#4a148c">INIT = TRANSITION</text>
<text x="955" y="299" font-size="11" text-anchor="middle" fill="#4a148c">Same bid formula, different context</text>

<!-- Universal clamp note at bottom -->
<rect x="590" y="395" width="420" height="80" rx="10" fill="#f8fafc" stroke="#90a4ae" stroke-width="1.5"/>
<text x="800" y="422" font-size="13" font-weight="700" text-anchor="middle" fill="#37474f">All phases converge →</text>
<text x="800" y="443" font-size="13" font-weight="600" text-anchor="middle" fill="#1565c0">finalCPC = clamp(bid, [$0.20, $5.00]) → round(4dp)</text>
<text x="800" y="465" font-size="11" text-anchor="middle" fill="#546e7a">Configurable bounds · universal safety clamp</text>
<!-- arrow pointing to box -->
<path d="M700 330 L700 393" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
</svg>
