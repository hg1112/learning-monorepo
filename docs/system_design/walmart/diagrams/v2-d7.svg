<svg width="1400" height="580" viewBox="0 0 1400 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<defs>
  <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#1565c0"/></marker>
  <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#2e7d32"/></marker>
  <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#e65100"/></marker>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#c62828"/></marker>
</defs>

<rect width="1400" height="580" fill="#f8fafc"/>
<text x="700" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#1a237e">Budget Pacing + Splitter Architecture</text>

<!-- ═══ LEFT: Budget Pacing (BudgetSvc) ═══ -->
<rect x="20" y="60" width="440" height="490" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
<rect x="20" y="60" width="440" height="40" rx="14" fill="#1565c0"/><rect x="20" y="80" width="440" height="20" fill="#1565c0"/>
<text x="240" y="89" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle" fill="white">BUDGET PACING — BudgetSvc</text>

<!-- Azure SQL primary -->
<rect x="60" y="125" width="360" height="80" rx="12" fill="#1565c0"/>
<text x="240" y="160" font-size="18" font-weight="700" text-anchor="middle" fill="white">Azure SQL</text>
<text x="240" y="183" font-size="12" text-anchor="middle" fill="#bbdefb">Authoritative daily budget ledger · transactional deduction</text>

<!-- Cassandra eligibility cache -->
<rect x="60" y="225" width="360" height="65" rx="10" fill="#1976d2"/>
<text x="240" y="257" font-size="15" font-weight="700" text-anchor="middle" fill="white">Cassandra</text>
<text x="240" y="278" font-size="11" text-anchor="middle" fill="#bbdefb">Eligibility status cache · low-latency auction checks</text>

<!-- Daily rollover -->
<rect x="60" y="310" width="360" height="65" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
<text x="240" y="337" font-size="14" font-weight="700" text-anchor="middle" fill="#1565c0">Daily Rollover</text>
<text x="240" y="358" font-size="11" text-anchor="middle" fill="#37474f">Midnight reset per tenant timezone</text>
<text x="240" y="374" font-size="11" text-anchor="middle" fill="#37474f">WMT · SAMS · INTL separate cycles</text>

<!-- Budget eligibility written to Cassandra -->
<rect x="60" y="395" width="360" height="65" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
<text x="240" y="422" font-size="14" font-weight="700" text-anchor="middle" fill="#1565c0">Eligibility Propagation</text>
<text x="240" y="443" font-size="11" text-anchor="middle" fill="#37474f">Budget status → Cassandra</text>
<text x="240" y="459" font-size="11" text-anchor="middle" fill="#37474f">→ IndexPublisher reads → Solr index updated</text>

<!-- Over-budget campaign badge -->
<rect x="60" y="475" width="170" height="55" rx="8" fill="#c62828"/>
<text x="145" y="500" font-size="12" font-weight="700" text-anchor="middle" fill="white">Over-Budget</text>
<text x="145" y="518" font-size="11" text-anchor="middle" fill="#ffcdd2">Campaign removed from index</text>

<!-- Under-budget campaign badge -->
<rect x="250" y="475" width="170" height="55" rx="8" fill="#2e7d32"/>
<text x="335" y="500" font-size="12" font-weight="700" text-anchor="middle" fill="white">In-Budget</text>
<text x="335" y="518" font-size="11" text-anchor="middle" fill="#c8e6c9">Eligible for auction</text>

<!-- arrows within BudgetSvc -->
<path d="M240 205 L240 223" stroke="#1565c0" stroke-width="2" marker-end="url(#ab)" fill="none"/>
<path d="M240 290 L240 308" stroke="#1565c0" stroke-width="2" marker-end="url(#ab)" fill="none"/>
<path d="M240 375 L240 393" stroke="#1565c0" stroke-width="2" marker-end="url(#ab)" fill="none"/>
<path d="M240 460 L145 473" stroke="#c62828" stroke-width="1.5" marker-end="url(#ar)" fill="none"/>
<path d="M240 460 L335 473" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ag)" fill="none"/>

<!-- ═══ RIGHT: Budget Splitter ═══ -->
<rect x="520" y="60" width="850" height="490" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
<rect x="520" y="60" width="850" height="40" rx="14" fill="#1b5e20"/><rect x="520" y="80" width="850" height="20" fill="#1b5e20"/>
<text x="945" y="89" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle" fill="white">BUDGET SPLITTER — A/B Experiment Budget Attribution</text>

<!-- Campaign Index -->
<rect x="560" y="125" width="230" height="70" rx="10" fill="#e53935"/>
<text x="675" y="156" font-size="15" font-weight="700" text-anchor="middle" fill="white">Campaign Index</text>
<text x="675" y="176" font-size="11" text-anchor="middle" fill="#ffcdd2">budgetBucketId attached to each candidate</text>

<!-- AdOrchestrator resolves bbid -->
<rect x="560" y="240" width="230" height="70" rx="10" fill="#388e3c"/>
<text x="675" y="270" font-size="15" font-weight="700" text-anchor="middle" fill="white">AdOrchestrator</text>
<text x="675" y="290" font-size="11" text-anchor="middle" fill="#c8e6c9">Resolves bbid from ExperimentPlatform</text>
<text x="675" y="307" font-size="11" text-anchor="middle" fill="#c8e6c9">experiment bucket config</text>
<path d="M675 195 L675 238" stroke="#81c784" stroke-width="2.5" marker-end="url(#ag)" fill="none"/>

<!-- AuctionEngine with bbid -->
<rect x="560" y="360" width="230" height="70" rx="10" fill="#004d40"/>
<text x="675" y="390" font-size="15" font-weight="700" text-anchor="middle" fill="white">AuctionEngine</text>
<text x="675" y="410" font-size="11" text-anchor="middle" fill="#b2dfdb">Computes bid per candidate</text>
<text x="675" y="427" font-size="11" text-anchor="middle" fill="#b2dfdb">Emits TROAS_SCORING_CALL{bbid}</text>
<path d="M675 310 L675 358" stroke="#81c784" stroke-width="2.5" marker-end="url(#ag)" fill="none"/>

<!-- Bucket A and Bucket B -->
<rect x="850" y="125" width="200" height="130" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
<text x="950" y="150" font-size="14" font-weight="700" text-anchor="middle" fill="#1565c0">Bucket A</text>
<text x="950" y="172" font-size="12" text-anchor="middle" fill="#37474f">Control campaign</text>
<text x="950" y="190" font-size="12" text-anchor="middle" fill="#37474f">Original bidding</text>
<text x="950" y="215" font-size="11" text-anchor="middle" fill="#546e7a">50% of budget</text>
<rect x="850" y="275" width="200" height="130" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
<text x="950" y="300" font-size="14" font-weight="700" text-anchor="middle" fill="#e65100">Bucket B</text>
<text x="950" y="322" font-size="12" text-anchor="middle" fill="#37474f">Test campaign</text>
<text x="950" y="340" font-size="12" text-anchor="middle" fill="#37474f">TROAS bidding</text>
<text x="950" y="365" font-size="11" text-anchor="middle" fill="#546e7a">50% of budget</text>

<path d="M790 195 L848 190" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)" fill="none"/>
<path d="M790 390 L848 340" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ao)" fill="none"/>

<!-- Click beacon format -->
<rect x="840" y="440" width="490" height="80" rx="12" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
<text x="1085" y="466" font-size="13" font-weight="700" text-anchor="middle" fill="#f57f17">Click Beacon Attribution</text>
<text x="1085" y="490" font-size="13" font-weight="600" text-anchor="middle" fill="#1a237e" font-family="'Courier New', monospace">bkt = "sp_wmt_srp|bb_BUCKET_A"</text>
<text x="1085" y="511" font-size="11" text-anchor="middle" fill="#546e7a">existing bucket + "|bb_" + bbid · enables per-bucket spend reporting</text>

<path d="M675 430 L675 455 L838 475" stroke="#f9a825" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ao)" fill="none"/>
</svg>
