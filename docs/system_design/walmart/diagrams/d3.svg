<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="600" fill="white"/>
  
  <text x="600" y="50" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#455a64">Performance: Manual Bidding vs. TROAS</text>
  
  <!-- Axes -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#455a64" stroke-width="3"/>
  <line x1="100" y1="100" x2="100" y2="500" stroke="#455a64" stroke-width="3"/>
  <text x="600" y="550" font-family="Arial" font-size="18" text-anchor="middle" fill="#455a64">Time →</text>
  <text x="50" y="300" font-family="Arial" font-size="18" text-anchor="middle" transform="rotate(-90, 50, 300)" fill="#455a64">Opportunity / Revenue</text>

  <!-- Manual Bidding (Flat Line) -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#grey" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="1110" y="405" font-family="Arial" font-size="16" font-weight="bold" fill="#455a64">Manual Bidding (Static)</text>

  <!-- TROAS Curve (Adaptive) -->
  <path d="M100 400 
           C 200 380, 250 450, 350 300 
           S 500 150, 600 250 
           S 750 400, 850 180 
           T 1100 120" 
        stroke="#0055aa" stroke-width="6" fill="none"/>
  
  <!-- Area fill for TROAS to show delta -->
  <path d="M100 400 
           C 200 380, 250 450, 350 300 
           S 500 150, 600 250 
           S 750 400, 850 180 
           T 1100 120
           L 1100 400 L 100 400" 
        fill="#0055aa" fill-opacity="0.1"/>

  <text x="1050" y="100" font-family="Arial" font-size="20" font-weight="bold" fill="#0055aa" text-anchor="end">TROAS (Adaptive Smart Bidding)</text>
  
  <!-- Callouts -->
  <circle cx="350" cy="300" r="8" fill="#bf360c"/>
  <text x="360" y="295" font-family="Arial" font-size="14" fill="#bf360c" font-weight="bold">Missed Op without TROAS</text>
  
  <circle cx="850" cy="180" r="8" fill="#1b5e20"/>
  <text x="860" y="175" font-family="Arial" font-size="14" fill="#1b5e20" font-weight="bold">Revenue Optimization</text>
  
  <!-- Legend -->
  <rect x="850" y="450" width="200" height="80" rx="5" fill="#f5f5f5" stroke="#455a64"/>
  <line x1="860" y1="475" x2="890" y2="475" stroke="#455a64" stroke-width="4" stroke-dasharray="5,2"/>
  <text x="900" y="480" font-family="Arial" font-size="14">Manual (Missed Spend)</text>
  <line x1="860" y1="505" x2="890" y2="505" stroke="#0055aa" stroke-width="4"/>
  <text x="900" y="510" font-family="Arial" font-size="14">TROAS (Smart Scaling)</text>
</svg>