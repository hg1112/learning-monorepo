<rect x="1106" y="185" width="6" height="40" rx="2" fill="#2e7d32"/>
<rect x="1118" y="180" width="6" height="45" rx="2" fill="#2e7d32"/>
<rect x="1130" y="185" width="6" height="40" rx="2" fill="#43a047"/>
<rect x="1142" y="195" width="6" height="30" rx="2" fill="#66bb6a"/>
<rect x="1154" y="200" width="6" height="25" rx="2" fill="#81c784"/>
<rect x="1166" y="205" width="6" height="20" rx="2" fill="#81c784"/>
<rect x="1178" y="200" width="6" height="25" rx="2" fill="#66bb6a"/>
<rect x="1190" y="190" width="6" height="35" rx="2" fill="#43a047"/>
<rect x="1202" y="185" width="6" height="40" rx="2" fill="#2e7d32"/>
<rect x="1214" y="180" width="6" height="45" rx="2" fill="#1b5e20"/>
<rect x="1226" y="175" width="6" height="50" rx="2" fill="#1b5e20"/>
<rect x="1238" y="185" width="6" height="40" rx="2" fill="#2e7d32"/>
<rect x="1250" y="200" width="6" height="25" rx="2" fill="#66bb6a"/>
<rect x="1262" y="210" width="6" height="15" rx="2" fill="#81c784"/>
<rect x="1274" y="215" width="6" height="10" rx="2" fill="#a5d6a7"/>
<rect x="1286" y="215" width="6" height="10" rx="2" fill="#a5d6a7"/>
<line x1="1010" y1="227" x2="1296" y2="227" stroke="#78909c" stroke-width="1"/>
<text x="1025" y="242" font-size="10" fill="#546e7a">0h</text>
<text x="1150" y="242" font-size="10" text-anchor="middle" fill="#546e7a">12h</text>
<text x="1280" y="242" font-size="10" fill="#546e7a">23h</text>

<rect x="1010" y="258" width="330" height="55" rx="8" fill="white"/>
<text x="1175" y="280" font-size="13" font-weight="600" text-anchor="middle" fill="#37474f">→ factor = vector[currentHour]</text>
<text x="1175" y="300" font-size="12" text-anchor="middle" fill="#546e7a">Must have exactly 24 elements</text>
<text x="1175" y="375" font-size="11" text-anchor="middle" fill="#546e7a">Source: day_part_bid_params (Azure SQL)</text>

<!-- ═══ BOTTOM: Version Validation + Output ═══ -->
<rect x="30" y="510" width="1340" height="120" rx="14" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
<text x="700" y="537" font-size="15" font-weight="700" text-anchor="middle" fill="#c62828">ConfigSvc Version Validation — applied to all 3 caches before use</text>

<rect x="60" y="550" width="380" height="60" rx="10" fill="white"/>
<text x="250" y="572" font-size="13" font-weight="700" text-anchor="middle" fill="#c62828">Version MATCH</text>
<text x="250" y="592" font-size="12" text-anchor="middle" fill="#37474f">Use cache value → bidParamsNode field populated</text>

<rect x="510" y="550" width="380" height="60" rx="10" fill="#fff8e1"/>
<text x="700" y="572" font-size="13" font-weight="700" text-anchor="middle" fill="#e65100">Version MISMATCH</text>
<text x="700" y="592" font-size="12" text-anchor="middle" fill="#37474f">VERSION_NOT_IN_CACHE counter + ConfigSvc default used</text>

<rect x="960" y="550" width="380" height="60" rx="10" fill="#e8f5e9"/>
<text x="1150" y="572" font-size="13" font-weight="700" text-anchor="middle" fill="#1b5e20">Zero-downtime rollout</text>
<text x="1150" y="592" font-size="12" text-anchor="middle" fill="#37474f">Stage new params → flip ConfigSvc key → instant activation</text>

