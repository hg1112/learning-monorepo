<path d="M225 392 L225 470 L700 470 L700 508" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar)" fill="none"/>
<path d="M700 482 L700 508" stroke="#c62828" stroke-width="2" marker-end="url(#ar)" fill="none"/>
<path d="M1175 392 L1175 470 L700 470" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>

<!-- bidParamsNode output -->
<rect x="580" y="430" width="240" height="50" rx="10" fill="#4a148c"/>
<text x="700" y="457" font-size="14" font-weight="700" text-anchor="middle" fill="white">bidParamsNode JSON → AuctionEngine</text>
<text x="700" y="474" font-size="11" text-anchor="middle" fill="#e1bee7">phase · weights · bidPrime · bounds · factors</text>
</svg>
