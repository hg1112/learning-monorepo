<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#ffffff" />
  
  <!-- Header Bar -->
  <rect width="1200" height="60" fill="#1e1e1e" />
  <text x="20" y="38" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="bold">TROAS Observability — Last 24h</text>
  
  <!-- Metric Chips -->
  <g transform="translate(550, 20)">
    <rect width="160" height="24" rx="4" fill="#333" />
    <text x="10" y="17" font-family="Arial, sans-serif" font-size="12" fill="#aaa">Total Auctions</text>
    <text x="100" y="17" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">2.4M</text>
  </g>
  <g transform="translate(730, 20)">
    <rect width="140" height="24" rx="4" fill="#333" />
    <text x="10" y="17" font-family="Arial, sans-serif" font-size="12" fill="#aaa">Avg pCVR</text>
    <text x="90" y="17" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">81%</text>
  </g>
  <g transform="translate(890, 20)">
    <rect width="140" height="24" rx="4" fill="#333" />
    <text x="10" y="17" font-family="Arial, sans-serif" font-size="12" fill="#aaa">Floor Hits</text>
    <text x="90" y="17" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">1.2%</text>
  </g>

  <!-- Panel 1: Donut Chart -->
  <g transform="translate(20, 80)">
    <rect width="370" height="500" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="18" fill="#333" font-weight="bold">Campaign Phase Distribution</text>
    
    <g transform="translate(185, 240)">
      <!-- Donut segments (Simplified paths) -->
      <!-- Optimization 55% green (#1b5e20) -->
      <path d="M 0 -110 A 110 110 0 1 1 -33.9 104.6 L -24.7 76.1 A 80 80 0 1 0 0 -80 Z" fill="#1b5e20" />
      <!-- Learning 30% amber (#e65100) -->
      <path d="M -33.9 104.6 A 110 110 0 0 1 -104.6 -33.9 L -76.1 -24.7 A 80 80 0 0 0 -24.7 76.1 Z" fill="#e65100" />
      <!-- Initialization 10% blue (#0055aa) -->
      <path d="M -104.6 -33.9 A 110 110 0 0 1 -64.6 -88.9 L -47 -64.7 A 80 80 0 0 0 -76.1 -24.7 Z" fill="#0055aa" />
      <!-- Learning Paused 5% red -->
      <path d="M -64.6 -88.9 A 110 110 0 0 1 0 -110 L 0 -80 A 80 80 0 0 0 -47 -64.7 Z" fill="#bf360c" />
      
      <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#333">1.2k</text>
      <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Campaigns</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(60, 400)">
      <rect width="12" height="12" fill="#1b5e20" /> <text x="20" y="11" font-family="Arial, sans-serif" font-size="12" fill="#333">OPTIMIZATION (55%)</text>
      <rect y="20" width="12" height="12" fill="#e65100" /> <text x="20" y="31" font-family="Arial, sans-serif" font-size="12" fill="#333">LEARNING (30%)</text>
      <rect y="40" width="12" height="12" fill="#0055aa" /> <text x="20" y="51" font-family="Arial, sans-serif" font-size="12" fill="#333">INITIALIZATION (10%)</text>
      <rect y="60" width="12" height="12" fill="#bf360c" /> <text x="20" y="71" font-family="Arial, sans-serif" font-size="12" fill="#333">LEARNING_PAUSED (5%)</text>
    </g>
  </g>

  <!-- Panel 2: Line Chart -->
  <g transform="translate(410, 80)">
    <rect width="380" height="500" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="18" fill="#333" font-weight="bold">pCVR Hit Rate over Time</text>
    
    <!-- Chart Area -->
    <g transform="translate(50, 80)">
      <!-- Grid -->
      <line x1="0" y1="0" x2="300" y2="0" stroke="#f0f0f0" /> <text x="-35" y="5" font-family="Arial, sans-serif" font-size="10" fill="#999">100%</text>
      <line x1="0" y1="75" x2="300" y2="75" stroke="#f0f0f0" /> <text x="-35" y="80" font-family="Arial, sans-serif" font-size="10" fill="#999">75%</text>
      <line x1="0" y1="150" x2="300" y2="150" stroke="#f0f0f0" /> <text x="-35" y="155" font-family="Arial, sans-serif" font-size="10" fill="#999">50%</text>
      <line x1="0" y1="225" x2="300" y2="225" stroke="#f0f0f0" /> <text x="-35" y="230" font-family="Arial, sans-serif" font-size="10" fill="#999">25%</text>
      <line x1="0" y1="300" x2="300" y2="300" stroke="#cccccc" /> <text x="-35" y="305" font-family="Arial, sans-serif" font-size="10" fill="#999">0%</text>
      
      <!-- Threshold Line -->
      <line x1="0" y1="90" x2="300" y2="90" stroke="#bf360c" stroke-dasharray="4,4" />
      <text x="220" y="85" font-family="Arial, sans-serif" font-size="10" fill="#bf360c">min threshold (70%)</text>
      
      <!-- Blue Line Path -->
      <path d="M 0 60 L 25 66 L 50 62 L 75 58 L 100 64 L 125 60 L 150 55 L 175 62 L 200 68 L 225 60 L 250 58 L 275 62 L 300 55" fill="none" stroke="#0055aa" stroke-width="3" />
      
      <!-- X-Axis Labels -->
      <text x="0" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">00:00</text>
      <text x="140" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">12:00</text>
      <text x="275" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">23:59</text>
    </g>
  </g>

  <!-- Panel 3: Bar Chart -->
  <g transform="translate(810, 80)">
    <rect width="370" height="500" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="18" fill="#333" font-weight="bold">Bid Floor Hits per Hour</text>
    
    <g transform="translate(50, 80)">
      <!-- Grid -->
      <line x1="0" y1="0" x2="290" y2="0" stroke="#f0f0f0" /> <text x="-25" y="5" font-family="Arial, sans-serif" font-size="10" fill="#999">50</text>
      <line x1="0" y1="150" x2="290" y2="150" stroke="#f0f0f0" /> <text x="-25" y="155" font-family="Arial, sans-serif" font-size="10" fill="#999">25</text>
      <line x1="0" y1="300" x2="290" y2="300" stroke="#cccccc" /> <text x="-25" y="305" font-family="Arial, sans-serif" font-size="10" fill="#999">0</text>
      
      <!-- Bars -->
      <rect x="5" y="280" width="8" height="20" fill="#cccccc" />
      <rect x="20" y="285" width="8" height="15" fill="#cccccc" />
      <rect x="35" y="270" width="8" height="30" fill="#cccccc" />
      <rect x="50" y="290" width="8" height="10" fill="#cccccc" />
      <rect x="65" y="220" width="8" height="80" fill="#bf360c" /> <!-- Spike -->
      <rect x="80" y="285" width="8" height="15" fill="#cccccc" />
      <rect x="95" y="280" width="8" height="20" fill="#cccccc" />
      <rect x="110" y="290" width="8" height="10" fill="#cccccc" />
      <rect x="125" y="275" width="8" height="25" fill="#cccccc" />
      <rect x="140" y="280" width="8" height="20" fill="#cccccc" />
      <rect x="155" y="285" width="8" height="15" fill="#cccccc" />
      <rect x="170" y="240" width="8" height="60" fill="#bf360c" /> <!-- Spike -->
      <rect x="185" y="280" width="8" height="20" fill="#cccccc" />
      <rect x="200" y="290" width="8" height="10" fill="#cccccc" />
      <rect x="215" y="285" width="8" height="15" fill="#cccccc" />
      <rect x="230" y="280" width="8" height="20" fill="#cccccc" />
      <rect x="245" y="270" width="8" height="30" fill="#cccccc" />
      <rect x="260" y="285" width="8" height="15" fill="#cccccc" />
      <rect x="275" y="280" width="8" height="20" fill="#cccccc" />
      
      <!-- X-Axis Labels -->
      <text x="0" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">00:00</text>
      <text x="135" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">12:00</text>
      <text x="265" y="320" font-family="Arial, sans-serif" font-size="10" fill="#999">23:59</text>
    </g>
  </g>
</svg>
