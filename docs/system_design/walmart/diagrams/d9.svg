<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="600" fill="white"/>
  
  <!-- Lifelines -->
  <g stroke="#455a64" stroke-width="1" stroke-dasharray="5,5">
    <line x1="100" y1="80" x2="100" y2="580"/>
    <line x1="250" y1="80" x2="250" y2="580"/>
    <line x1="400" y1="80" x2="400" y2="580"/>
    <line x1="550" y1="80" x2="550" y2="580"/>
    <line x1="700" y1="80" x2="700" y2="580"/>
    <line x1="850" y1="80" x2="850" y2="580"/>
    <line x1="1000" y1="80" x2="1000" y2="580"/>
    <line x1="1150" y1="80" x2="1150" y2="580"/>
  </g>

  <!-- Actors -->
  <rect x="50" y="20" width="100" height="40" rx="5" fill="#e8f0fe" stroke="#0055aa"/>
  <text x="100" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Campaign Service</text>

  <rect x="200" y="20" width="100" height="40" rx="5" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="250" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Campaign Indexer</text>

  <rect x="350" y="20" width="100" height="40" rx="5" fill="#fff3e0" stroke="#bf360c"/>
  <text x="400" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Ad Gateway</text>

  <rect x="500" y="20" width="100" height="40" rx="5" fill="#fff3e0" stroke="#bf360c"/>
  <text x="550" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Ad Orchestrator</text>

  <rect x="650" y="20" width="100" height="40" rx="5" fill="#f3e5f5" stroke="#4a148c"/>
  <text x="700" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Bidding Engine</text>

  <rect x="800" y="20" width="100" height="40" rx="5" fill="#eceff1" stroke="#455a64"/>
  <text x="850" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Auction Engine</text>

  <rect x="950" y="20" width="100" height="40" rx="5" fill="#e1f5fe" stroke="#0055aa"/>
  <text x="1000" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">ML Platform</text>

  <rect x="1100" y="20" width="100" height="40" rx="5" fill="#455a64" stroke="#000"/>
  <text x="1150" y="45" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Shopper</text>

  <!-- Flow -->
  <path d="M100 100 L250 100" stroke="#0055aa" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="175" y="95" font-family="Arial" font-size="9" text-anchor="middle">targetRoas (Kafka)</text>

  <path d="M250 130 L400 130" stroke="#1b5e20" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="325" y="125" font-family="Arial" font-size="9" text-anchor="middle">Ad Indexed (Solr)</text>

  <path d="M1150 160 L400 160" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="775" y="155" font-family="Arial" font-size="10" text-anchor="middle">Search Request</text>

  <path d="M400 190 L550 190" stroke="#bf360c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="475" y="185" font-family="Arial" font-size="10" text-anchor="middle">Fan-out</text>

  <path d="M550 220 L700 220" stroke="#bf360c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="625" y="215" font-family="Arial" font-size="9" text-anchor="middle">Get Bids (bbid)</text>

  <!-- Bidding Engine Work -->
  <rect x="690" y="230" width="20" height="80" fill="#f3e5f5" stroke="#4a148c"/>
  <text x="720" y="275" font-family="Arial" font-size="8" fill="#4a148c">3 Caches +<br/>Version Check</text>

  <path d="M700 320 L850 320" stroke="#4a148c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="775" y="315" font-family="Arial" font-size="9" text-anchor="middle">troasNode JSON</text>

  <!-- Auction Engine Work -->
  <path d="M850 350 L1000 350" stroke="#455a64" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="925" y="345" font-family="Arial" font-size="9" text-anchor="middle">pCVR / pVPC Score</text>
  <path d="M1000 380 L850 380" stroke="#455a64" stroke-width="2" stroke-dasharray="2,1" fill="none" marker-end="url(#arrow)"/>

  <rect x="840" y="400" width="20" height="60" fill="#eceff1" stroke="#455a64"/>
  <text x="870" y="435" font-family="Arial" font-size="8" fill="#455a64">Compute CPC<br/>(Phase logic)</text>

  <path d="M850 480 L550 480" stroke="#455a64" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="475" font-family="Arial" font-size="9" text-anchor="middle">finalCPC List</text>

  <path d="M550 510 L400 510" stroke="#bf360c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="475" y="505" font-family="Arial" font-size="9" text-anchor="middle">TSP Auction Winners</text>

  <path d="M400 550 L1150 550" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="775" y="545" font-family="Arial" font-size="10" text-anchor="middle">Rendered Ads</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
    </marker>
  </defs>
</svg>